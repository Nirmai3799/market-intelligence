version: "3.8"

services:

  db:
    image: postgres:15
    container_name: mi_postgres
    environment:
      POSTGRES_USER: mi_user
      POSTGRES_PASSWORD: mi_password
      POSTGRES_DB: market_intelligence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mi_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
